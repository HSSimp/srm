<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>관계의 결 — SRM</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Nanum+Myeongjo:wght@400;700&family=Gowun+Dodum&family=Gothic+A1:wght@300;400;500;700&display=swap');

  :root{
    --bg:#fbf8f2;
    --bg-soft:#f4efe4;
    --ink:#4a4138;
    --ink-soft:#6a5f55;
    --muted:#9b9082;
    --faint:#c7bdad;
    --line:#ebe5d8;
    --card:#ffffff;
    --accent:#b87b3f;
    --accent-soft:#f0e1c8;
    --accent-pale:#faf3e6;
  }

  *{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
  html,body{height:100%;}
  body{
    background:var(--bg);
    color:var(--ink);
    font-family:'Gothic A1', system-ui, sans-serif;
    display:flex;justify-content:center;
    background-image:radial-gradient(circle at 50% 0%, #fff9ec 0%, var(--bg) 60%);
  }

  /* serif helper class */
  .serif{font-family:'Nanum Myeongjo','Gowun Dodum',serif;font-weight:400;}

  .app{
    width:100%;max-width:440px;min-height:100vh;
    padding:0 24px 56px;position:relative;display:flex;flex-direction:column;
  }

  /* progress line */
  .progress-line{
    position:fixed;top:0;left:50%;transform:translateX(-50%);
    width:100%;max-width:440px;height:2px;
    background:transparent;z-index:10;
  }
  .progress-line::after{
    content:'';position:absolute;left:0;top:0;bottom:0;
    background:var(--accent);width:var(--pw,0%);
    transition:width .5s cubic-bezier(.4,0,.2,1);opacity:.85;
  }

  /* quiz dots */
  .dots{
    display:flex;gap:7px;justify-content:center;align-items:center;
    padding:40px 0 0;min-height:64px;
  }
  .dot{width:6px;height:6px;border-radius:50%;background:var(--faint);transition:all .4s ease;opacity:.55;}
  .dot.done{background:var(--muted);opacity:.7;}
  .dot.current{background:var(--accent);transform:scale(1.7);opacity:1;}

  #screen{flex:1;}

  /* start */
  .start{display:flex;flex-direction:column;justify-content:center;min-height:100vh;}
  .eyebrow{color:var(--accent);font-size:12px;letter-spacing:.22em;font-weight:500;margin-bottom:24px;text-transform:uppercase;}
  .start h1{font-family:'Nanum Myeongjo',serif;font-size:30px;line-height:1.5;font-weight:400;color:var(--ink);margin-bottom:20px;}
  .start .promise{color:var(--ink-soft);font-size:15.5px;line-height:1.75;margin-bottom:44px;font-family:'Gowun Dodum',serif;}
  .start .promise b{color:var(--ink);font-weight:700;}

  /* buttons */
  .btn{
    background:var(--accent);color:#fff;border:none;
    padding:17px;border-radius:14px;font-size:15.5px;font-weight:500;
    font-family:'Gothic A1';cursor:pointer;width:100%;
    transition:transform .15s ease, background .2s;
    margin-bottom:10px;letter-spacing:-.01em;
  }
  .btn:hover{background:#a06a32;}
  .btn:active{transform:scale(.98);}
  .btn.ghost{
    background:transparent;color:var(--ink-soft);font-weight:400;
    font-size:14px;padding:14px;border:1px solid var(--line);
  }
  .btn.ghost:hover{background:#fff;border-color:var(--muted);}

  /* quiz */
  .q-wrap{display:flex;flex-direction:column;justify-content:center;min-height:100vh;}
  .chunk-label{color:var(--accent);font-size:11.5px;letter-spacing:.14em;margin-bottom:18px;font-weight:500;opacity:0;transition:opacity .4s;min-height:16px;text-transform:uppercase;}
  .chunk-label.show{opacity:.9;}
  .q-text{
    font-family:'Nanum Myeongjo',serif;
    font-size:25px;line-height:1.6;
    color:var(--ink-soft);
    min-height:130px;font-weight:400;
    margin-bottom:32px;
  }

  /* horizontal scale */
  .phrase-display{
    text-align:center;color:var(--accent);
    font-family:'Nanum Myeongjo',serif;font-size:17px;
    min-height:28px;margin-bottom:18px;
    opacity:0;transition:opacity .25s ease;
  }
  .phrase-display.show{opacity:1;}

  .scale-h{
    display:flex;gap:0;justify-content:space-between;align-items:center;
    position:relative;padding:0 14px;
  }
  .scale-h::before{
    content:'';position:absolute;left:14px;right:14px;top:50%;height:1px;
    background:var(--line);transform:translateY(-50%);
  }
  .scale-h .dot-opt{
    width:46px;height:46px;border-radius:50%;
    background:var(--card);border:1.5px solid var(--line);
    cursor:pointer;display:flex;align-items:center;justify-content:center;
    position:relative;z-index:1;
    transition:all .2s cubic-bezier(.2,.7,.2,1);
    color:transparent;font-size:0;
  }
  .scale-h .dot-opt::after{
    content:'';width:8px;height:8px;border-radius:50%;background:var(--faint);
    transition:all .2s ease;
  }
  .scale-h .dot-opt:hover{border-color:var(--muted);transform:scale(1.05);}
  .scale-h .dot-opt:hover::after{background:var(--muted);}
  .scale-h .dot-opt.sel{
    border-color:var(--accent);background:var(--accent);transform:scale(1.15);
    box-shadow:0 4px 14px -4px rgba(184,123,63,.4);
  }
  .scale-h .dot-opt.sel::after{background:#fff;width:14px;height:14px;}

  .scale-anchors{
    display:flex;justify-content:space-between;
    padding:14px 6px 0;font-size:11.5px;color:var(--faint);
    letter-spacing:.05em;
  }

  .back{margin-top:28px;text-align:center;}
  .back button{background:none;border:none;color:var(--faint);font-size:13px;cursor:pointer;font-family:'Gothic A1';transition:color .2s;}
  .back button:hover{color:var(--muted);}

  /* result */
  .result-wrap{padding-top:48px;}
  .result-head{margin-bottom:32px;}
  .result-head .stage-tag{color:var(--accent);font-size:11.5px;letter-spacing:.22em;font-weight:500;margin-bottom:10px;text-transform:uppercase;}
  .result-head h2{font-family:'Nanum Myeongjo',serif;font-size:26px;font-weight:400;line-height:1.55;color:var(--ink);}

  /* cards */
  .card{
    background:var(--card);border:1px solid var(--line);border-radius:18px;
    padding:24px 22px 26px;margin-bottom:14px;
    box-shadow:0 1px 0 rgba(80,60,40,.02);
  }
  .card .lead{
    font-family:'Nanum Myeongjo',serif;
    font-size:18px;line-height:1.65;color:var(--ink);
    margin-bottom:12px;
  }
  .card .shadow-line{color:var(--ink-soft);font-size:14.5px;line-height:1.75;font-family:'Gowun Dodum',serif;}
  .card .basis{color:var(--faint);font-size:11.5px;margin-top:16px;font-style:italic;letter-spacing:.02em;}

  /* refine ask */
  .refine-ask{
    text-align:center;margin:32px 0 16px;
    font-family:'Nanum Myeongjo',serif;font-size:16px;color:var(--ink-soft);
    line-height:1.6;
  }

  /* match screen */
  .match-intro{padding-top:48px;}
  .match-intro h2{font-family:'Nanum Myeongjo',serif;font-size:25px;font-weight:400;line-height:1.55;color:var(--ink);margin-bottom:14px;}
  .match-intro .sub{color:var(--ink-soft);font-size:14.5px;line-height:1.7;font-family:'Gowun Dodum',serif;margin-bottom:28px;}

  .mbti-deck{
    margin:0 -24px;padding:8px 24px 28px;
    display:flex;gap:12px;overflow-x:auto;
    scroll-snap-type:x mandatory;
    -webkit-overflow-scrolling:touch;
    scrollbar-width:none;
  }
  .mbti-deck::-webkit-scrollbar{display:none;}
  .mbti-card{
    flex:0 0 210px;scroll-snap-align:center;
    background:var(--card);border:1px solid var(--line);border-radius:18px;
    padding:30px 20px 26px;text-align:center;cursor:pointer;
    transition:all .2s ease;
  }
  .mbti-card:hover{border-color:var(--accent);transform:translateY(-2px);}
  .mbti-card.sel{border-color:var(--accent);background:var(--accent-pale);}
  .mbti-card .code{
    font-family:'Nanum Myeongjo',serif;font-size:28px;font-weight:700;
    color:var(--accent);letter-spacing:.08em;margin-bottom:8px;
  }
  .mbti-card .nick{
    font-family:'Nanum Myeongjo',serif;font-size:14.5px;color:var(--ink);
    margin-bottom:10px;
  }
  .mbti-card .desc{font-size:12.5px;color:var(--muted);line-height:1.55;font-family:'Gowun Dodum',serif;}

  .deck-hint{
    text-align:center;font-size:12px;color:var(--faint);
    margin:-12px 0 16px;letter-spacing:.05em;
  }

  .dont-know{
    background:var(--bg-soft);border:1px solid var(--line);border-radius:16px;
    padding:20px 22px;margin-top:8px;
  }
  .dont-know .dk-q{
    font-family:'Nanum Myeongjo',serif;font-size:15.5px;color:var(--ink);
    margin-bottom:12px;line-height:1.55;
  }
  .dont-know .dk-help{font-size:13px;color:var(--ink-soft);line-height:1.7;margin-bottom:16px;font-family:'Gowun Dodum',serif;}
  .copy-btn{
    background:#fff;color:var(--accent);
    border:1px solid var(--accent);padding:13px;border-radius:12px;
    font-size:14px;font-weight:500;font-family:'Gothic A1';cursor:pointer;width:100%;
    transition:all .2s;
  }
  .copy-btn:hover{background:var(--accent);color:#fff;}
  .copy-btn.copied{background:#e8f0e0;border-color:#7a9961;color:#4d6c3a;}

  /* match result */
  .match-result{padding-top:48px;}
  .pair-glyph{
    text-align:center;margin-bottom:24px;
    font-family:'Nanum Myeongjo',serif;
    font-size:13px;color:var(--muted);letter-spacing:.18em;
  }
  .pair-glyph .pair-codes{
    font-size:22px;color:var(--accent);margin-top:6px;letter-spacing:.12em;
  }

  /* animations */
  .anim-in{animation:fadeUp .5s cubic-bezier(.2,.7,.2,1);}
  @keyframes fadeUp{from{opacity:0;transform:translateY(14px);}to{opacity:1;transform:translateY(0);}}
  .fading{opacity:0;transform:translateY(-10px);transition:all .2s ease;}
</style>
</head>
<body>
<div class="app">
  <div class="progress-line" id="pline" style="--pw:0%"></div>
  <div id="dots-area"></div>

const DIM_LABEL = {E:"에너지 방향", A:"공감 방식", C:"실행 스타일", N:"감정 결", O:"새로움 태도", H:"정직·태도"};

// MBTI 16 (D2 유지 — 본인 라벨은 비공개. 상대 입력 인터페이스로만 사용)
const MBTI = [
  {code:"INTJ", nick:"전략가",     desc:"멀리 보고 조용히 움직여요"},
  {code:"INTP", nick:"논리가",     desc:"머릿속에서 늘 가설을 굴려요"},
  {code:"ENTJ", nick:"지휘관",     desc:"목표를 향해 사람을 이끌어요"},
  {code:"ENTP", nick:"변론가",     desc:"가능성을 즐기고 토론을 좋아해요"},
  {code:"INFJ", nick:"옹호자",     desc:"속이 깊고 통찰력 있어요"},
  {code:"INFP", nick:"중재자",     desc:"진심과 가치를 따라가요"},
  {code:"ENFJ", nick:"선도자",     desc:"사람을 따뜻하게 끌어모아요"},
  {code:"ENFP", nick:"활동가",     desc:"감정과 영감의 폭이 넓어요"},
  {code:"ISTJ", nick:"현실주의자", desc:"맡은 일을 흔들림 없이 해내요"},
  {code:"ISFJ", nick:"수호자",     desc:"조용히 주변을 챙기는 사람이에요"},
  {code:"ESTJ", nick:"경영자",     desc:"질서와 효율을 만들어내요"},
  {code:"ESFJ", nick:"집정관",     desc:"사람과 관계를 잘 살펴요"},
  {code:"ISTP", nick:"장인",       desc:"조용하지만 손이 빨라요"},
  {code:"ISFP", nick:"모험가",     desc:"섬세하고 자기 결을 따라가요"},
  {code:"ESTP", nick:"사업가",     desc:"지금 이 순간에 강한 사람이에요"},
  {code:"ESFP", nick:"연예인",     desc:"분위기를 환하게 만들어요"},
];

// MBTI → Big5 추정 (M1 매핑 기반 단순화)
function mbtiToBig5(code){
  const c = code.toUpperCase();
  return {
    E: c[0]==='E' ? 4.0 : 2.0,
    O: c[1]==='N' ? 4.0 : 2.5,
    A: c[2]==='F' ? 3.8 : 2.8,
    C: c[3]==='J' ? 4.0 : 2.5,
    N: 3.0, H: 3.0,
  };
}

// ══════════════════════════════════════════════════════════════
// STATE
// ══════════════════════════════════════════════════════════════
let answers = {};
let currentItems = [];
let currentIdx = 0;
let currentSel = null;
let appStage = 'start';
let scores = {};
let blurDim = null, dim2 = null;
let partnerMBTI = null;

// ══════════════════════════════════════════════════════════════
// SCORING
// ══════════════════════════════════════════════════════════════
function allItemsFlat(){
  return [...CORE, ...Object.values(ADAPTIVE).flat(), ...H_ITEMS];
}
function computeScores(){
  const acc = {E:[],A:[],C:[],N:[],O:[],H:[]};
  for(const [id,val] of Object.entries(answers)){
    const it = allItemsFlat().find(x=>x.id===id);
    if(!it) continue;
    const s = it.rev ? (6-val) : val;
    if(acc[it.dim]) acc[it.dim].push(s);
  }
  const out = {};
  for(const [d,v] of Object.entries(acc)){
    out[d] = v.length ? v.reduce((a,b)=>a+b,0)/v.length : null;
  }
  return out;
}
function level(s){if(s==null) return 'u'; if(s>=3.5) return 'h'; if(s<=2.5) return 'l'; return 'm';}
function getCopy(d, s){const lv=level(s); const c=COPY[d]; if(!c||lv==='m'||lv==='u') return null; return lv==='h'?c.high:c.low;}
function sortByClarity(sc, n){
  return ['E','A','C','N','O','H']
    .filter(d=>sc[d]!=null)
    .sort((a,b)=>Math.abs(sc[b]-3) - Math.abs(sc[a]-3))
    .slice(0,n);
}
function sortByAmbiguity(sc){
  return ['E','A','C','N','O']
    .filter(d=>sc[d]!=null)
    .sort((a,b)=>Math.abs(sc[a]-3) - Math.abs(sc[b]-3));
}

// ══════════════════════════════════════════════════════════════
// HTML helpers
// ══════════════════════════════════════════════════════════════
function cardHtml(c){
  return `<div class="card">
    <div class="lead">${c.lead}</div>
    <div class="shadow-line">${c.shadow}</div>
    <div class="basis">— ${c.basis}</div>
  </div>`;
}
function neutralCardHtml(dim){
  return `<div class="card">
    <div class="lead">두 방향이 모두 보이는 사람이에요.</div>
    <div class="shadow-line">상황에 따라 달라지는 쪽이에요. 문항을 더 답하면 더 선명해져요.</div>
    <div class="basis">— ${DIM_LABEL[dim]||dim} 관련 응답에서</div>
  </div>`;
}

const pline = document.getElementById('pline');
const dotsEl = document.getElementById('dots-area');
const screen = document.getElementById('screen');
function setProg(done,total){pline.style.setProperty('--pw',(total?done/total*100:0)+'%');}
function renderDots(done,total){
  if(!total){dotsEl.innerHTML='';return;}
  dotsEl.innerHTML = '<div class="dots">' +
    Array.from({length:total},(_,i)=>{
      let c='dot'; if(i<done) c+=' done'; else if(i===done) c+=' current'; return `<span class="${c}"></span>`;
    }).join('') + '</div>';
}

// ══════════════════════════════════════════════════════════════
// START
// ══════════════════════════════════════════════════════════════
function showStart(){
  appStage='start';
  setProg(0,0); dotsEl.innerHTML='';
  screen.innerHTML = `
    <div class="start anim-in">
      <div class="eyebrow">관계 예측</div>
      <h1>두 사람이 어떻게<br>맞물릴지 비춰드려요.</h1>
      <p class="promise"><b>1분이면 끝나요.</b> 짧은 질문 <b>10개</b>,<br>고민 말고 느낌대로 답해주세요.</p>
      <button class="btn" onclick="startQuiz()">시작하기</button>
      <button class="btn ghost" onclick="showInfo()">어떻게 작동하나요?</button>
    </div>`;
}
function showInfo(){
  screen.innerHTML = `
    <div class="start anim-in">
      <div class="eyebrow">작동 방식</div>
      <h1>유형명은<br>알려드리지 않아요.</h1>
      <p class="promise">심리학적으로 검증된 Big Five 측정을 기반으로,<br>두 사람의 관계가 어떻게 흐를지만 비춰드려요.<br><br>"ENTJ라서" "전갈자리라서" 같은 선입견 없이,<br>실제 응답에 근거한 서술만 드려요.</p>
      <button class="btn" onclick="startQuiz()">시작하기</button>
      <button class="btn ghost" onclick="showStart()">뒤로</button>
    </div>`;
}

// ══════════════════════════════════════════════════════════════
// QUIZ
// ══════════════════════════════════════════════════════════════
function startQuiz(){answers={}; currentItems=CORE; currentIdx=0; appStage='quiz'; showItem();}

function showItem(){
  const it = currentItems[currentIdx];
  const total = currentItems.length;
  const prevChunk = currentIdx>0 ? (currentItems[currentIdx-1].chunk??0) : -1;
  const newChunk = (it.chunk!=null && it.chunk!==prevChunk && it.chunk>0);
  const sel = answers[it.id] || null;
  currentSel = sel;
  renderDots(currentIdx, total);
  setProg(currentIdx, total);

  screen.innerHTML = `
    <div class="q-wrap anim-in">
      <div class="chunk-label ${newChunk?'show':''}">${newChunk && it.chunk<CHUNK_LABEL.length ? CHUNK_LABEL[it.chunk] : ''}</div>
      <div class="q-text serif">${it.t}</div>
      <div class="phrase-display ${sel?'show':''}" id="phrase">${sel ? SCALE_PHRASES[sel-1] : ''}</div>
      <div class="scale-h" id="scale">
        ${[1,2,3,4,5].map(v=>`<div class="dot-opt ${sel===v?'sel':''}" data-v="${v}" onclick="answer(${v})">${v}</div>`).join('')}
      </div>
      <div class="scale-anchors"><span>${SCALE_ANCHORS[0]}</span><span>${SCALE_ANCHORS[1]}</span></div>
      <div class="back">${currentIdx>0?'<button onclick="goBack()">← 이전</button>':''}</div>
    </div>`;
}

function answer(v){
  const id = currentItems[currentIdx].id;
  answers[id] = v;
  document.querySelectorAll('.dot-opt').forEach(el=>{
    el.classList.toggle('sel', Number(el.dataset.v)===v);
  });
  const ph = document.getElementById('phrase');
  ph.textContent = SCALE_PHRASES[v-1];
  ph.classList.add('show');

  setTimeout(()=>{
    const qw = document.querySelector('.q-wrap');
    if(qw) qw.classList.add('fading');
    setTimeout(()=>{
      currentIdx++;
      if(currentIdx >= currentItems.length) onPhaseComplete();
      else showItem();
    }, 220);
  }, 420);
}
function goBack(){if(currentIdx>0){currentIdx--; showItem();}}

function onPhaseComplete(){
  scores = computeScores();
  if(appStage==='quiz'){
    const amb = sortByAmbiguity(scores);
    blurDim = amb[0]; dim2 = amb[1] || null;
    showS1();
  } else if(appStage==='adaptive'){
    showS2();
  } else if(appStage==='deep'){
    showS3();
  }
}

// ══════════════════════════════════════════════════════════════
// RESULT 1 — 결론형 (사다리 표현 폐기)
// ══════════════════════════════════════════════════════════════
function showS1(){
  appStage='s1';
  setProg(0,0); dotsEl.innerHTML='';
  const top = sortByClarity(scores, 3);
  const cards = top.map(d=>{
    const c = getCopy(d, scores[d]);
    return c ? cardHtml(c) : neutralCardHtml(d);
  }).join('');

  screen.innerHTML = `
    <div class="result-wrap anim-in">
      <div class="result-head">
        <div class="stage-tag">당신의 결</div>
        <h2>지금까지의 응답으로<br>이런 모습이 보여요.</h2>
      </div>
      ${cards}
      <div class="refine-ask">더 정확하게 보고 싶다면?</div>
      <button class="btn" onclick="startAdaptive()">3문항 더 답하기</button>
      <button class="btn ghost" onclick="goToMatch()">지금 관계 보기</button>
    </div>`;
}

// ══════════════════════════════════════════════════════════════
// ADAPTIVE (3문항)
// ══════════════════════════════════════════════════════════════
function startAdaptive(){
  appStage='adaptive';
  const pool = (ADAPTIVE[blurDim] || []).slice(0,2);
  currentItems = [...pool, H_ITEMS[0]].map(it=>({...it, chunk:0}));
  currentIdx = 0;
  showItem();
}

function showS2(){
  appStage='s2';
  setProg(0,0); dotsEl.innerHTML='';
  const top = sortByClarity(scores, 4);
  const cards = top.map(d=>{
    const c = getCopy(d, scores[d]);
    return c ? cardHtml(c) : neutralCardHtml(d);
  }).join('');

  screen.innerHTML = `
    <div class="result-wrap anim-in">
      <div class="result-head">
        <div class="stage-tag">한 걸음 더</div>
        <h2>더 들어가서 본<br>당신의 결이에요.</h2>
      </div>
      ${cards}
      <div class="refine-ask">관계 신호까지 깊이 보고 싶다면?</div>
      <button class="btn" onclick="startDeep()">5문항 더 답하기</button>
      <button class="btn ghost" onclick="goToMatch()">관계 보기</button>
    </div>`;
}

// ══════════════════════════════════════════════════════════════
// DEEP (5문항)
// ══════════════════════════════════════════════════════════════
function startDeep(){
  appStage='deep';
  const d2 = dim2 ? (ADAPTIVE[dim2]||[]) : [];
  const d3 = ['E','A','C','N','O'].find(d=>d!==blurDim && d!==dim2);
  const d3items = d3 ? (ADAPTIVE[d3]||[]).slice(0,1) : [];
  currentItems = [...H_ITEMS.slice(1), ...d2, ...d3items].slice(0,5).map(it=>({...it, chunk:0}));
  currentIdx = 0;
  showItem();
}

function showS3(){
  appStage='s3';
  setProg(0,0); dotsEl.innerHTML='';
  const cl = level(scores.C)==='m' ? 'l' : level(scores.C);
  const al = level(scores.A)==='m' ? 'l' : level(scores.A);
  const ol = level(scores.O)==='m' ? 'l' : level(scores.O);
  const conflict = REL_CONFLICT[`${cl}_${al}`] || "갈등 방식은 상황에 따라 달라요.";
  const rhythm = REL_RHYTHM[`${cl}_${ol}`] || "생활 리듬은 상황에 따라 달라요.";

  screen.innerHTML = `
    <div class="result-wrap anim-in">
      <div class="result-head">
        <div class="stage-tag">관계 신호</div>
        <h2>관계에서 가장 중요한<br>두 가지 결이에요.</h2>
      </div>
      <div class="card">
        <div class="lead">갈등 방식</div>
        <div class="shadow-line">${conflict}</div>
        <div class="basis">— 계획·공감 결합 응답에서</div>
      </div>
      <div class="card">
        <div class="lead">생활 리듬</div>
        <div class="shadow-line">${rhythm}</div>
        <div class="basis">— 실행·새로움 결합 응답에서</div>
      </div>
      <div class="refine-ask">상대방과 어떻게 맞물릴까요?</div>
      <button class="btn" onclick="goToMatch()">관계 매칭 시작하기</button>
      <button class="btn ghost" onclick="showStart()">처음부터 다시</button>
    </div>`;
}

// ══════════════════════════════════════════════════════════════
// MATCH — MBTI 슬라이드 선택
// ══════════════════════════════════════════════════════════════
function goToMatch(){
  appStage='match';
  setProg(0,0); dotsEl.innerHTML='';
  const cards = MBTI.map(m=>`
    <div class="mbti-card" onclick="pickMBTI('${m.code}')">
      <div class="code">${m.code}</div>
      <div class="nick">${m.nick}</div>
      <div class="desc">${m.desc}</div>
    </div>`).join('');

  screen.innerHTML = `
    <div class="match-intro anim-in">
      <div class="eyebrow">관계 매칭</div>
      <h2>상대방의 타입을<br>골라주세요.</h2>
      <p class="sub">상대를 어떻게 보고 있는지가 기준이면 충분해요.<br>오른쪽으로 밀어서 더 많은 타입을 볼 수 있어요.</p>
    </div>
    <div class="mbti-deck" id="deck">${cards}</div>
    <div class="deck-hint">← 좌우로 밀어보세요 →</div>
    <div class="dont-know">
      <div class="dk-q">상대의 타입을 모르시나요?</div>
      <div class="dk-help">상대방에게 검사 링크를 보내면, 본인의 결과를 받아볼 수 있어요. 상대는 본인 유형명을 모르는 채로 답해도 됩니다.</div>
      <button class="copy-btn" id="copyBtn" onclick="copyShareLink()">검사 링크 복사하기</button>
    </div>
    <div style="margin-top:20px"><button class="btn ghost" onclick="showStart()">처음으로</button></div>`;
}

function pickMBTI(code){
  partnerMBTI = code;
  document.querySelectorAll('.mbti-card').forEach(el=>{
    el.classList.toggle('sel', el.querySelector('.code').textContent===code);
  });
  setTimeout(()=>showMatchResult(code), 320);
}

function showMatchResult(code){
  const partner = mbtiToBig5(code);
  const me = scores;
  const cl = level(me.C)==='m'?'l':level(me.C);
  const partnerCl = partner.C>=3.5?'h':'l';
  const partnerAl = partner.A>=3.5?'h':'l';
  const partnerOl = partner.O>=3.5?'h':'l';
  const al = level(me.A)==='m'?'l':level(me.A);
  const ol = level(me.O)==='m'?'l':level(me.O);

  // 페어 매칭 휴리스틱 (단순 v1)
  const compat = {
    conflict: REL_CONFLICT[`${cl}_${al}`] || "—",
    rhythm: REL_RHYTHM[`${cl}_${ol}`] || "—",
  };

  const me_E = level(me.E), me_O = level(me.O), me_C = level(me.C);
  const sim_E = (me_E==='h' && partner.E>=3.5) || (me_E==='l' && partner.E<3);
  const diff_O = (me_O==='h') !== (partner.O>=3.5);
  const diff_C = (me_C==='h') !== (partner.C>=3.5);

  const energyText = sim_E
    ? "에너지 패턴이 비슷해요. 같이 있어도 따로 있어도 부담이 적은 조합이에요."
    : "에너지 방향이 달라요. 한쪽이 모임을 원할 때 다른 쪽이 쉬고 싶을 수 있어요.";
  const noveltyText = diff_O
    ? "새로움에 대한 태도가 달라요. 한쪽이 변화를 제안할 때 다른 쪽은 멈추고 싶어해요."
    : "새로움에 대한 결이 비슷해서, 일상 결정에서 충돌이 적어요.";
  const planText = diff_C
    ? "한 명이 계획적이고 다른 한 명이 즉흥적이에요. 보완이 되지만 갈등 포인트가 될 수도 있어요."
    : "실행 스타일이 비슷해서 일을 같이 풀어가기 편해요.";

  screen.innerHTML = `
    <div class="match-result anim-in">
      <div class="pair-glyph">
        나 × 상대
        <div class="pair-codes">● — ${code}</div>
      </div>
      <div class="result-head" style="margin-bottom:20px">
        <div class="stage-tag">관계의 결</div>
        <h2>두 사람은 이렇게<br>맞물려요.</h2>
      </div>
      <div class="card">
        <div class="lead">에너지</div>
        <div class="shadow-line">${energyText}</div>
      </div>
      <div class="card">
        <div class="lead">새로움</div>
        <div class="shadow-line">${noveltyText}</div>
      </div>
      <div class="card">
        <div class="lead">계획 vs 즉흥</div>
        <div class="shadow-line">${planText}</div>
      </div>
      <div class="card">
        <div class="lead">갈등 방식</div>
        <div class="shadow-line">${compat.conflict}</div>
      </div>
      <div style="margin-top:20px">
        <button class="btn ghost" onclick="goToMatch()">다른 타입으로 다시 보기</button>
        <button class="btn ghost" onclick="showStart()">처음으로</button>
      </div>
    </div>`;
}

// ══════════════════════════════════════════════════════════════
// SHARE LINK
// ══════════════════════════════════════════════════════════════
async function copyShareLink(){
  const btn = document.getElementById('copyBtn');
  try{
    await navigator.clipboard.writeText(SHARE_URL);
    btn.textContent = "✓ 링크가 복사됐어요";
    btn.classList.add('copied');
  }catch(e){
    // fallback: temporary textarea
    const ta = document.createElement('textarea');
    ta.value = SHARE_URL; document.body.appendChild(ta); ta.select();
    try{document.execCommand('copy'); btn.textContent="✓ 링크가 복사됐어요"; btn.classList.add('copied');}
    catch(e2){btn.textContent="링크: " + SHARE_URL;}
    document.body.removeChild(ta);
  }
  setTimeout(()=>{btn.textContent="검사 링크 복사하기"; btn.classList.remove('copied');}, 3200);
}

showStart();
</script>
